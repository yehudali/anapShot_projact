apiVersion: v1
kind: Secret
metadata:
  name: anashot-secret
type: Opaque
# All values must be base64 encoded:  echo -n "your-value" | base64
stringData:
  MONGO_URL: "mongodb+srv://<user>:<pass>@<cluster>.mongodb.net/anashot"
  REDIS_URL: "redis://redis-service:6379"
  SECRET_KEY: "change-me-to-a-strong-random-string"
  VAPID_PRIVATE_KEY: ""
  VAPID_PUBLIC_KEY: ""
  VAPID_CLAIMS_EMAIL: "admin@example.com"
  # Kafka is not used in production — leave empty
  KAFKA_BOOTSTRAP_SERVERS: ""
